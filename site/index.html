:root{
  --ink:#241A15; --sub:#8A7264; --faint:#BFA08F; --line:#F3E3D9;
  --white:#FFFFFF; --mist:#FFF6F0; --tangerine:#FF6A3D; --tangerine-light:#FF9166;
  --ember:#E24E1B; --sun:#FFC98F;
  --glass:rgba(255,255,255,.72); --glass-border:rgba(255,255,255,.9);

  --chrome-bg:#EFE4DB;
  --chrome-bg2:#F6EEE6;
  --chrome-panel:#FFFFFF;
  --chrome-ink:#241A15;
  --chrome-sub:#8A7264;
  --chrome-faint:#A98D7C;
  --chrome-line:rgba(36,26,21,.12);
  --chrome-shadow:rgba(60,32,18,.14);
}
@media (prefers-color-scheme: dark){
  :root{
    --chrome-bg:#18120F;
    --chrome-bg2:#211712;
    --chrome-panel:#251A15;
    --chrome-ink:#F6ECE5;
    --chrome-sub:#CBAD9B;
    --chrome-faint:#8C6F5F;
    --chrome-line:rgba(255,255,255,.1);
    --chrome-shadow:rgba(0,0,0,.5);
  }
}
:root[data-theme="dark"]{
  --chrome-bg:#18120F; --chrome-bg2:#211712; --chrome-panel:#251A15;
  --chrome-ink:#F6ECE5; --chrome-sub:#CBAD9B; --chrome-faint:#8C6F5F;
  --chrome-line:rgba(255,255,255,.1); --chrome-shadow:rgba(0,0,0,.5);
}
:root[data-theme="light"]{
  --chrome-bg:#EFE4DB; --chrome-bg2:#F6EEE6; --chrome-panel:#FFFFFF;
  --chrome-ink:#241A15; --chrome-sub:#8A7264; --chrome-faint:#A98D7C;
  --chrome-line:rgba(36,26,21,.12); --chrome-shadow:rgba(60,32,18,.14);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1100px 520px at 12% -8%, color-mix(in srgb, var(--tangerine) 10%, transparent), transparent 60%),
    var(--chrome-bg);
  color:var(--chrome-ink);
  font-family:'Jost',system-ui,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

.shell{
  max-width:1180px;
  margin:0 auto;
  padding:28px 20px 60px;
}

/* ---- top bar ---- */
.topbar{
  display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
  flex-wrap:wrap;
  margin-bottom:26px;
  padding-bottom:18px;
  border-bottom:1px solid var(--chrome-line);
}
.brandmark{
  display:flex; align-items:baseline; gap:12px;
}
.brandmark .mark{
  font-family:'Cormorant Garamond',serif; font-weight:500; font-size:30px; color:var(--chrome-ink);
}
.brandmark .sub{
  font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--chrome-faint);
}
.legend{
  display:flex; gap:18px; font-size:12px; color:var(--chrome-sub); flex-wrap:wrap;
}
.legend span{display:inline-flex; align-items:center; gap:7px;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.dot.built{background:var(--ember);}
.dot.concept{background:transparent;border:1.5px solid var(--chrome-faint);}

/* ---- layout ---- */
.layout{
  display:grid;
  grid-template-columns:220px 1fr 260px;
  gap:26px;
  align-items:start;
}
@media (max-width:980px){
  .layout{grid-template-columns:1fr;}
  .rail{order:1;}
  .stage{order:2;}
  .notes{order:3;}
}

/* ---- rail ---- */
.rail{
  position:sticky; top:20px;
  display:flex; flex-direction:column; gap:16px;
  max-height:calc(100vh - 40px);
  overflow-y:auto;
  padding-right:4px;
}
@media (max-width:980px){
  .rail{position:static; max-height:none; flex-direction:row; overflow-x:auto; overflow-y:visible; padding-bottom:6px;}
  .flow-group{min-width:150px;}
}
.flow-group-title{
  font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--chrome-faint);
  margin:0 0 8px 2px;
}
.flow-group{margin-bottom:2px;}
.railbtn{
  display:flex; align-items:center; gap:8px; width:100%;
  text-align:left; background:none; border:1px solid transparent; border-radius:10px;
  padding:7px 9px; margin-bottom:2px; cursor:pointer;
  color:var(--chrome-sub); font-family:'Jost'; font-size:12.5px;
}
.railbtn:hover{background:var(--chrome-panel);}
.railbtn.active{background:var(--chrome-panel); border-color:var(--chrome-line); color:var(--chrome-ink); font-weight:500; box-shadow:0 2px 10px var(--chrome-shadow);}
.railbtn .code{font-size:10px; color:var(--chrome-faint); min-width:20px;}
.railbtn:focus-visible, .navbtn:focus-visible, .gbtn:focus-visible, .gbtn-ghost:focus-visible, .chip:focus-visible, .choice-row:focus-visible{
  outline:2px solid var(--tangerine); outline-offset:2px;
}

/* ---- stage ---- */
.stage{display:flex; flex-direction:column; align-items:center; gap:16px;}
.stage-head{text-align:center;}
.stage-code{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--chrome-faint);}
.stage-title{font-family:'Cormorant Garamond'; font-weight:500; font-size:22px; margin:2px 0 0;}
.stage-status{
  display:inline-flex; align-items:center; gap:6px; margin-top:6px;
  font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--chrome-sub);
}

/* phone frame */
.phone-shell{
  width:340px; height:706px;
  border-radius:44px;
  padding:12px;
  background:linear-gradient(160deg,#3a2c24,#17110d);
  box-shadow:0 30px 60px var(--chrome-shadow), 0 2px 0 rgba(255,255,255,.06) inset;
  position:relative;
}
.phone-notch{
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  width:120px; height:22px; background:#17110d; border-radius:0 0 16px 16px; z-index:5;
}
.phone-screen{
  width:100%; height:100%;
  background:var(--white);
  border-radius:32px;
  overflow:hidden;
  position:relative;
  display:flex; flex-direction:column;
}
.statusbar{
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 22px 0; font-size:12px; font-family:'Jost'; font-weight:500; color:#241A15;
  flex-shrink:0; position:relative; z-index:4;
}
.statusbar.on-grad{color:#fff;}
.screen-scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
.home-indicator{
  position:absolute; bottom:7px; left:50%; transform:translateX(-50%);
  width:120px; height:4px; border-radius:3px; background:rgba(0,0,0,.25); z-index:5;
}
.home-indicator.on-grad{background:rgba(255,255,255,.55);}

/* nav controls */
.navrow{display:flex; align-items:center; gap:14px;}
.navbtn{
  border:1px solid var(--chrome-line); background:var(--chrome-panel); color:var(--chrome-ink);
  font-family:'Jost'; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
  padding:10px 18px; border-radius:999px; cursor:pointer;
}
.navbtn:hover{border-color:var(--tangerine); color:var(--ember);}
.navbtn:disabled{opacity:.35; cursor:default;}
.navbtn:disabled:hover{border-color:var(--chrome-line); color:var(--chrome-ink);}
.stepcount{font-size:12px; color:var(--chrome-sub); min-width:64px; text-align:center; font-variant-numeric:tabular-nums;}

/* ---- notes panel ---- */
.notes{
  position:sticky; top:20px;
  background:var(--chrome-panel);
  border:1px solid var(--chrome-line);
  border-radius:16px;
  padding:18px 18px 20px;
  box-shadow:0 10px 30px var(--chrome-shadow);
}
@media (max-width:980px){.notes{position:static;}}
.notes h4{
  font-family:'Jost'; font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:var(--chrome-faint); margin:0 0 10px;
}
.notes p{font-size:13.5px; line-height:1.55; color:var(--chrome-sub); margin:0 0 14px;}
.notes p:last-child{margin-bottom:0;}
.notes .flag{
  display:inline-block; font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
  padding:4px 9px; border-radius:999px; margin-bottom:12px;
}
.flag.built{background:color-mix(in srgb, var(--ember) 14%, transparent); color:var(--ember);}
.flag.concept{background:color-mix(in srgb, var(--chrome-faint) 18%, transparent); color:var(--chrome-sub);}

/* =====================================================
   Inner phone-screen styles — mirror theme/clementine.ts
   ===================================================== */
.px{padding-left:22px;padding-right:22px;}
.label{font-family:'Jost';font-weight:300;font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--faint);}
.h1{font-family:'Cormorant Garamond';font-weight:500;font-size:30px;color:var(--ink);margin:4px 0 0;line-height:1.12;}
.h2{font-family:'Cormorant Garamond';font-weight:500;font-size:26px;color:var(--ink);margin:0;}
.note-i{font-family:'Cormorant Garamond';font-style:italic;font-weight:400;font-size:15px;color:var(--sub);margin:3px 0 0;}
.accent{font-family:'Caveat';font-weight:700;font-size:23px;color:var(--ember);}

.gcard{
  border-radius:18px; border:1px solid var(--glass-border); overflow:hidden;
  background:linear-gradient(180deg, rgba(255,255,255,.86), rgba(255,246,240,.72));
  box-shadow:0 10px 18px rgba(226,78,27,.12);
  padding:14px 15px;
}
.gbtn{
  display:block; width:100%; border:0; cursor:pointer; border-radius:999px; padding:14px 0;
  background:linear-gradient(180deg,#FF8A57,#FF6A3D);
  color:#fff; font-family:'Jost'; font-weight:500; font-size:12px; letter-spacing:3px; text-transform:uppercase;
  box-shadow:0 10px 16px rgba(255,106,61,.38);
  position:relative; overflow:hidden;
}
.gbtn::after{content:"";position:absolute;top:0;left:0;right:0;height:46%;background:rgba(255,255,255,.35);}
.gbtn-ghost{
  display:block; width:100%; border:1px solid var(--glass-border); cursor:pointer; border-radius:999px; padding:14px 0;
  background:rgba(255,240,232,.7);
  color:var(--ember); font-family:'Jost'; font-weight:500; font-size:12px; letter-spacing:3px; text-transform:uppercase;
}

.choice-row{
  display:flex; align-items:center; gap:12px; background:#fff; border-radius:18px; padding:12px 13px;
  margin-bottom:9px; border:1.5px solid var(--line);
}
.choice-row.sel{border-color:var(--tangerine); background:#FFF3EC;}
.choice-emoji{font-size:21px;}
.choice-title{font-family:'Jost';font-weight:500;font-size:14.5px;color:var(--ink);}
.choice-desc{font-family:'Jost';font-weight:400;font-size:12px;color:var(--sub);margin-top:1px;}

.chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.chip{
  border-radius:999px; padding:8px 15px; border:1.5px solid var(--line); background:#fff;
  font-family:'Jost'; font-size:13px; color:var(--ink); cursor:default;
}
.chip.sel{background:var(--tangerine); border-color:var(--tangerine); color:#fff;}

.hero-grad{
  height:150px; position:relative; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#FF7A45,#FF9E6B,#FFC08C); flex-shrink:0;
}
.hero-grad.tall{height:300px;}
.hero-sheen{position:absolute; top:0; left:0; width:62%; height:100%; background:rgba(255,255,255,.16); transform:skewX(-12deg);}
.hero-brand{position:absolute; top:44px; color:#fff; font-family:'Jost'; font-weight:300; font-size:13px; letter-spacing:7px;}
.spark{position:absolute; color:#fff;}

.env-row{display:flex; gap:8px; margin:12px 0;}
.env-item{flex:1; text-align:center; padding:12px 6px;}
.env-val{font-family:'Cormorant Garamond'; font-weight:500; font-size:21px; color:var(--ember);}
.env-lbl{font-family:'Jost'; font-weight:300; font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--faint); margin-top:3px;}

.who{font-family:'Jost';font-weight:300;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:4px;}
.expert-text{font-family:'Jost';font-size:13.5px;color:var(--ink);line-height:1.5;}

.delight{background:#F7EEF5;border:1px solid #ecd8ea;border-radius:18px;padding:11px 12px;font-family:'Jost';font-size:12.5px;color:#6a4f66;line-height:1.5;}

.section-block{margin-top:12px;background:#fff;border-radius:18px;border:1px solid var(--line);padding:13px 14px;}
.section-title{font-family:'Jost';font-weight:500;font-size:13.5px;color:#5a4034;margin-bottom:4px;}
.step-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-top:1px solid var(--line);}
.step-row:first-child{border-top:0;}
.step-name{font-family:'Jost';font-size:14px;color:#3a2c24;}
.step-tag{font-family:'Jost';font-weight:300;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);}

.viewfinder{
  margin:14px 0; height:200px; border-radius:18px; background:#1c1310;
  position:relative; display:flex; align-items:center; justify-content:center;
}
.vf-corner{position:absolute; width:26px; height:26px; border:2.5px solid var(--sun);}
.vf-tl{top:14px;left:14px;border-right:0;border-bottom:0;}
.vf-tr{top:14px;right:14px;border-left:0;border-bottom:0;}
.vf-bl{bottom:14px;left:14px;border-right:0;border-top:0;}
.vf-br{bottom:14px;right:14px;border-left:0;border-top:0;}
.vf-label{color:#F3E3D9;font-family:'Jost';font-size:11.5px;letter-spacing:1px;}
.thumbrow{display:flex;gap:8px;margin-top:10px;}
.thumb{flex:1;background:#FFF3EC;border:1px solid var(--line);border-radius:12px;padding:8px 9px;font-family:'Jost';font-size:11.5px;color:var(--ink);}
.thumb b{color:var(--ember);}

.photo-slot{
  margin:14px 0; height:180px; border-radius:18px; border:1.5px dashed var(--faint);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px;
  color:var(--sub); font-family:'Jost'; font-size:12.5px; background:#FFFBF8;
}
.photo-slot .plus{font-size:26px;color:var(--tangerine);font-weight:300;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.prod-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;}
.prod-icon{font-size:20px;}
.prod-name{font-family:'Jost';font-weight:500;font-size:12.5px;color:var(--ink);margin-top:6px;}
.prod-type{font-family:'Jost';font-weight:300;font-size:10.5px;color:var(--sub);margin-top:1px;}
.prod-tag{display:inline-block;margin-top:6px;font-family:'Jost';font-size:8.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ember);background:#FFF3EC;padding:3px 7px;border-radius:999px;}

.warn-banner{background:#FFF3EC;border:1px solid var(--sun);border-radius:14px;padding:11px 12px;font-family:'Jost';font-size:12px;color:#7a4a1f;line-height:1.5;margin-top:10px;}

.chatwrap{display:flex;flex-direction:column;gap:10px;padding-top:6px;}
.bubble{max-width:80%;padding:10px 13px;border-radius:16px;font-family:'Jost';font-size:12.5px;line-height:1.5;}
.bubble.user{align-self:flex-end;background:var(--tangerine);color:#fff;border-bottom-right-radius:5px;}
.bubble.expert{align-self:flex-start;background:#fff;border:1px solid var(--line);color:var(--ink);border-bottom-left-radius:5px;}
.bubble.safety{border-color:var(--sun);background:#FFFBF3;}
.chat-input{margin-top:auto;display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:10px 14px;color:var(--faint);font-family:'Jost';font-size:12px;background:#fff;}

.lock-time{color:#fff;font-family:'Cormorant Garamond';font-weight:500;font-size:56px;text-align:center;margin-top:60px;}
.lock-date{color:rgba(255,255,255,.8);font-family:'Jost';font-size:12px;text-align:center;letter-spacing:1px;margin-top:2px;}
.notif{
  margin:26px 16px 0; background:rgba(40,28,22,.82); backdrop-filter:blur(6px);
  border-radius:16px; padding:12px 13px; display:flex; gap:10px; align-items:flex-start;
  border:1px solid rgba(255,255,255,.12);
}
.notif-emoji{font-size:20px;}
.notif-title{color:#fff;font-family:'Jost';font-weight:500;font-size:12px;}
.notif-body{color:rgba(255,255,255,.82);font-family:'Jost';font-size:11.5px;line-height:1.45;margin-top:2px;}
.notif-time{color:rgba(255,255,255,.5);font-size:10px;font-family:'Jost';margin-left:auto;flex-shrink:0;}

.photopair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
.photopair div{height:130px;border-radius:14px;background:linear-gradient(160deg,#FFE9DC,#FFD9C0);display:flex;align-items:flex-end;padding:8px;font-family:'Jost';font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#7a4a1f;}

.rowline{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--line);font-family:'Jost';font-size:13px;color:var(--ink);}
.rowline:first-child{border-top:0;}
.rowline span.k{color:var(--sub);font-size:11.5px;}
.toggle{width:34px;height:19px;border-radius:999px;background:var(--line);position:relative;flex-shrink:0;}
.toggle.on{background:var(--tangerine);}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.toggle.on::after{left:17px;}

.bodytext{font-family:'Jost';font-size:13.5px;line-height:1.6;color:var(--ink);}
.plist{display:flex;flex-direction:column;gap:9px;margin-top:12px;}
.plist .gcard{padding:11px 13px;font-family:'Jost';font-size:12.5px;color:var(--ink);line-height:1.5;}
.pagenav{display:flex;align-items:center;gap:6px;}
.pagenav a{
  font-family:'Jost';font-size:11.5px;letter-spacing:1px;color:var(--chrome-sub);
  text-decoration:none;padding:8px 14px;border-radius:999px;border:1px solid var(--chrome-line);
}
.pagenav a.active{color:var(--chrome-ink);border-color:var(--tangerine);font-weight:500;}
.pagenav a:hover{border-color:var(--tangerine);color:var(--ember);}
</style>
</head>
<body>

  <div class="topbar">
    <div class="brandmark">
      <span class="mark">Skinship</span>

</div>

<script>

function ritualSection(title, items) {
  return `<div class="section-block">
    <div class="section-title">${title}</div>
    ${items.map(it => `<div class="step-row"><span class="step-name">${it.name}</span><span class="step-tag">${it.tag}</span></div>`).join('')}
  </div>`;
}
function envRow() {
  return `<div class="env-row">
    <div class="gcard env-item"><div class="env-val">${MOCK.city.uv}</div><div class="env-lbl">UV</div></div>
    <div class="gcard env-item"><div class="env-val">${MOCK.city.humidity}%</div><div class="env-lbl">Humidity</div></div>
    <div class="gcard env-item"><div class="env-val">${MOCK.city.aqi}</div><div class="env-lbl">AQI · ${MOCK.city.aqiLabel}</div></div>
  </div>`;
}

// ---- screen list, following README section 8 screen map ----
const SCREENS = [
{
  flow:'A', code:'A1', title:'Welcome', built:true,
  notes:[ 'Real code — <code>app/index.tsx</code>.', 'First five seconds set the whole promise: “considered, never sold to.” No login wall, no paywall, no “sign up to continue.”', 'Watch for: is the tangerine gradient reading premium, or too loud, on first impression?' ],

        <div style="font-size:26px;">📍</div>

// ---- render / nav logic ----
const FLOW_NAMES = { A:'Setup', B:'Everyday', C:'Weekly', D:'Her shelf', E:'You' };
let current = 0;

function buildRail(){
  const rail = document.getElementById('rail');
  let html = '';
  let lastFlow = null;
  SCREENS.forEach((s, i) => {
    if (s.flow !== lastFlow) {
      if (lastFlow !== null) html += '</div>';
      html += `<div class="flow-group"><div class="flow-group-title">Flow ${s.flow} — ${FLOW_NAMES[s.flow]}</div>`;
      lastFlow = s.flow;
    }
    html += `<button class="railbtn" data-i="${i}"><span class="code">${s.code}</span><span>${s.title}</span></button>`;
  });
  html += '</div>';
  rail.innerHTML = html;
  rail.querySelectorAll('.railbtn').forEach(b => b.addEventListener('click', () => goTo(+b.dataset.i)));
}

function render(){
  const s = SCREENS[current];
  document.getElementById('stageCode').textContent = `${s.code} · Flow ${s.flow}`;
  document.getElementById('stageTitle').textContent = s.title;
  document.getElementById('stageStatus').innerHTML = s.built
    ? '<i class="dot built"></i> built in app code'
    : '<i class="dot concept"></i> concept, not yet coded';
  document.getElementById('phoneScreen').innerHTML = s.render();
  document.getElementById('stepCount').textContent = `${current+1} of ${SCREENS.length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === SCREENS.length - 1;
  document.getElementById('notesFlag').textContent = s.built ? 'Built in app code' : 'Concept — for feedback';
  document.getElementById('notesFlag').className = 'flag ' + (s.built ? 'built' : 'concept');
  document.getElementById('notesBody').innerHTML = s.notes.map(n => `<p>${n}</p>`).join('');
  document.querySelectorAll('.railbtn').forEach(b => b.classList.toggle('active', +b.dataset.i === current));
  const active = document.querySelector('.railbtn.active');
  if (active) active.scrollIntoView({ block:'nearest', inline:'nearest' });
}

function goTo(i){
  current = Math.max(0, Math.min(SCREENS.length - 1, i));
  render();
}

document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') goTo(current + 1);
  if (e.key === 'ArrowLeft') goTo(current - 1);
});

// basic swipe support on the phone
(function(){
  let sx = null;
  const el = document.getElementById('phoneScreen');
  el.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive:true });
  el.addEventListener('touchend', e => {
    if (sx === null) return;
    const dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 60) goTo(current + (dx < 0 ? 1 : -1));
    sx = null;
  }, { passive:true });
})();

buildRail();
render();

</script>
